<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hamburg Offline</title>

<style>
  body, html {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial;
    color: white;
  }

  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: opacity 1.5s ease-in-out;
  }

  #bg1 { z-index: 1; }
  #bg2 { z-index: 2; }

  .overlay {
    position: relative;
    z-index: 3;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  #clock { font-size: 300px; }
  #date { font-size: 100px; }
  #weather { font-size: 80px; margin-top: 20px; }
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay">
  <div id="clock"></div>
  <div id="date"></div>
  <div id="weather">Loading...</div>
</div>

<script>

// ⏰ ساعت هامبورگ
function updateTime() {
  const now = new Date();

  document.getElementById("clock").innerText =
    now.toLocaleTimeString('en-GB', { timeZone: 'Europe/Berlin' });

  document.getElementById("date").innerText =
    now.toLocaleDateString('en-GB', {
      timeZone: 'Europe/Berlin',
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
}
setInterval(updateTime, 1000);
updateTime();


// 🌤️ آب‌وهوا (آنلاین)
async function getWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=53.55&longitude=10.00&current_weather=true");
    const data = await res.json();

    document.getElementById("weather").innerText =
      `Hamburg 🌡️ ${data.current_weather.temperature}°C`;
  } catch {
    document.getElementById("weather").innerText = "Offline mode";
  }
}
getWeather();


// 🖼️ تصاویر آفلاین
const images = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg",
  "images/4.jpg",
  "images/5.jpg",
  "images/6.jpg",
  "images/7.jpg",
  "images/8.jpg",
  "images/9.jpg",
  "images/10.jpg"
];

let index = 0;
let current = 1;

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");

// تصویر اول
bg1.style.backgroundImage = `url(${images[0]})`;
bg1.style.opacity = 1;
bg2.style.opacity = 0;

// تغییر تصویر
function changeBackground() {
  index = (index + 1) % images.length;

  if (current === 1) {
    bg2.style.backgroundImage = `url(${images[index]})`;
    bg2.style.opacity = 1;
    bg1.style.opacity = 0;
    current = 2;
  } else {
    bg1.style.backgroundImage = `url(${images[index]})`;
    bg1.style.opacity = 1;
    bg2.style.opacity = 0;
    current = 1;
  }
}

setInterval(changeBackground, 5000);

</script>

</body>
</html>
